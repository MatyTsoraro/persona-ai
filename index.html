<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PersonaAI Pro</title>
    <!-- שימוש באייקונים מקצועיים -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #bc13fe;
            --bg: #0a0a12;
            --panel: #161625;
            --text: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { padding: 20px; text-align: center; background: linear-gradient(90deg, var(--panel), var(--bg)); border-bottom: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10;}
        h1 { font-size: 1.8rem; background: -webkit-linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px;}
        
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; }
        .viewport { width: 100%; max-width: 400px; aspect-ratio: 3/4; background: var(--panel); border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 0 30px rgba(0, 243, 255, 0.05); border: 2px solid #2a2a40; transition: all 0.3s ease; }
        
        video, img, canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        img { display: none; z-index: 2; }
        canvas { display: none; }
        
        .controls { width: 100%; max-width: 400px; display: flex; justify-content: space-around; align-items: center; padding: 20px 0; z-index: 10; }
        button { background: var(--panel); color: var(--text); border: 1px solid #333; border-radius: 50%; width: 60px; height: 60px; font-size: 1.2rem; cursor: pointer; transition: all 0.2s ease; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        button:active { transform: scale(0.95); }
        
        #captureBtn { background: linear-gradient(45deg, var(--primary), var(--secondary)); border: none; color: white; width: 80px; height: 80px; font-size: 2rem; box-shadow: 0 0 20px rgba(188, 19, 254, 0.4); }
        #retakeBtn, #downloadBtn { display: none; }
        
        /* סורק לייזר בזמן ההמתנה */
        .scanner { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: var(--primary); box-shadow: 0 0 15px 2px var(--primary); animation: scan 1.5s linear infinite; display: none; z-index: 3; }
        .status { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 20px; font-size: 1rem; z-index: 4; display: none; text-align: center; width: 85%; backdrop-filter: blur(5px); border: 1px solid var(--primary); color: var(--primary); font-weight: bold;}
        
        @keyframes scan { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
    </style>
</head>
<body>
    <header>
        <h1>PERSONA AI</h1>
    </header>
    
    <div class="container">
        <div class="viewport" id="viewport">
            <!-- התצוגה המקדימה של המצלמה -->
            <video id="video" autoplay playsinline></video>
            <!-- הציור הנסתר ללכידת הפריים -->
            <canvas id="canvas"></canvas>
            <!-- התמונה הסופית -->
            <img id="resultImg" alt="AI Result">
            <!-- אפקטים לממשק -->
            <div class="scanner" id="scanner"></div>
            <div class="status" id="statusText">מתחבר למנוע AI...</div>
        </div>
        
        <div class="controls">
            <button id="switchCameraBtn"><i class="fas fa-sync-alt"></i></button>
            <button id="captureBtn"><i class="fas fa-camera"></i></button>
            <button id="retakeBtn"><i class="fas fa-undo"></i></button>
            <button id="downloadBtn"><i class="fas fa-download"></i></button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const resultImg = document.getElementById('resultImg');
        const captureBtn = document.getElementById('captureBtn');
        const retakeBtn = document.getElementById('retakeBtn');
        const switchCameraBtn = document.getElementById('switchCameraBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const scanner = document.getElementById('scanner');
        const statusText = document.getElementById('statusText');
        const viewport = document.getElementById('viewport');

        let currentFacingMode = 'user';
        let stream = null;

        // הפעלת מצלמה
        async function initCamera() {
            if (stream) stream.getTracks().forEach(track => track.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: { ideal: 1080 }, height: { ideal: 1440 } }
                });
                video.srcObject = stream;
            } catch (err) {
                statusText.innerText = "שגיאה: אין גישה למצלמה";
                statusText.style.display = 'block';
            }
        }

        // החלפת מצלמה (קדמית/אחורית)
        switchCameraBtn.addEventListener('click', () => {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            initCamera();
        });

        // צילום
        captureBtn.addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            
            // היפוך מראה אם מצלמה קדמית
            if (currentFacingMode === 'user') {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(video, 0, 0);
            
            // שינוי מצב ממשק בזמן עיבוד
            video.pause();
            captureBtn.style.display = 'none';
            switchCameraBtn.style.display = 'none';
            scanner.style.display = 'block';
            statusText.style.display = 'block';
            statusText.innerText = "יוצר אווטאר תלת מימדי...";
            viewport.style.borderColor = "var(--primary)";

            // המרה ל-Base64 כדי לשלוח ל-API
            const imageDataBase64 = canvas.toDataURL('image/jpeg', 0.8);

            // הפעלת הפונקציה שתתקשר עם השרת
            processWithAI(imageDataBase64);
        });

        // פונקציית הליבה - כאן יוכנס חיבור ה-API האמיתי בהמשך
        function processWithAI(base64Image) {
            
            // ==========================================
            // במערכת אמיתית, כאן תהיה קריאת FETCH למודל AI
            // לדוגמה:
            // fetch('https://api.your-server.com/generate', {
            //     method: 'POST',
            //     body: JSON.stringify({ image: base64Image, style: 'cyberpunk' })
            // })
            // ==========================================

            // סימולציה של זמן עיבוד במנוע בינה מלאכותית (3 שניות)
            setTimeout(() => {
                // כרגע נציג את התמונה עם פילטר מתקדם רק כדי לסגור את המעגל
                resultImg.src = base64Image;
                resultImg.style.filter = "contrast(1.2) saturate(1.3) sepia(0.3) hue-rotate(-20deg)";
                showResult();
            }, 3000);
        }

        function showResult() {
            scanner.style.display = 'none';
            statusText.style.display = 'none';
            video.style.display = 'none';
            resultImg.style.display = 'block';
            retakeBtn.style.display = 'flex';
            downloadBtn.style.display = 'flex';
            viewport.style.borderColor = "var(--secondary)";
            viewport.style.boxShadow = "0 0 30px rgba(188, 19, 254, 0.2)";
        }

        // צילום מחדש
        retakeBtn.addEventListener('click', () => {
            resultImg.style.display = 'none';
            video.style.display = 'block';
            video.play();
            retakeBtn.style.display = 'none';
            downloadBtn.style.display = 'none';
            captureBtn.style.display = 'flex';
            switchCameraBtn.style.display = 'flex';
            viewport.style.borderColor = "#2a2a40";
            viewport.style.boxShadow = "none";
            resultImg.style.filter = "none";
        });

        // הורדת התמונה
        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'PersonaAI_Avatar.jpg';
            link.href = resultImg.src;
            link.click();
        });

        // הפעלה ראשונית
        initCamera();
    </script>
</body>
</html>
