<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viral Avatar Studio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #00f3ff; --secondary: #bc13fe; --bg: #0a0a12; --panel: #161625; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { padding: 15px; text-align: center; background: linear-gradient(90deg, var(--panel), var(--bg)); border-bottom: 1px solid #333; z-index: 10;}
        h1 { font-size: 1.8rem; background: -webkit-linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; margin: 0; font-weight: 900;}
        
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 15px; position: relative; gap: 15px;}
        .viewport { width: 100%; max-width: 400px; flex-grow: 1; background: var(--panel); border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 0 20px rgba(0, 0, 0, 0.5); border: 2px solid #2a2a40; display: flex; justify-content: center; align-items: center;}
        
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        img { display: none; width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 2; }
        canvas { display: none; }
        
        /* סורק ואפקט טעינה */
        .scanner-container { position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 3; display: none; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);}
        .scanner-line { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--primary); box-shadow: 0 0 20px 5px var(--primary); animation: scan 1.5s ease-in-out infinite alternate; }
        .overlay-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; font-weight: bold; color: var(--primary); border: 1px solid var(--primary); text-align: center; width: 85%; line-height: 1.5;}
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* אזור תחתון */
        .bottom-area { width: 100%; max-width: 400px; min-height: 120px; display: flex; flex-direction: column; justify-content: center; padding-bottom: 20px;}
        
        .camera-controls { display: flex; justify-content: space-around; align-items: center; width: 100%; }
        button.icon-btn { background: var(--panel); color: var(--text); border: 1px solid #333; border-radius: 50%; width: 60px; height: 60px; font-size: 1.2rem; cursor: pointer; transition: all 0.2s ease; display: flex; justify-content: center; align-items: center; }
        button.icon-btn:active { transform: scale(0.95); }
        
        #captureBtn { background: linear-gradient(45deg, var(--primary), var(--secondary)); border: none; width: 85px; height: 85px; font-size: 2.5rem; box-shadow: 0 0 20px rgba(188, 19, 254, 0.4); color: white;}

        /* תפריט סגנונות גלוי ונגלל */
        #styleMenu { display: none; flex-direction: column; width: 100%; gap: 15px; overflow-y: auto; max-height: 35vh;}
        .category { margin-bottom: 5px; }
        .category-title { font-size: 0.9rem; color: #888; margin-bottom: 8px; padding-right: 5px; font-weight: bold;}
        .style-scroll { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; scrollbar-width: none; }
        .style-scroll::-webkit-scrollbar { display: none; }
        
        .style-card { flex: 0 0 100px; height: 105px; background: var(--panel); border-radius: 15px; border: 2px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: all 0.2s; color: white;}
        .style-card i { font-size: 2rem; }
        .style-card span { font-size: 0.8rem; text-align: center; font-weight: bold; }
        .style-card:active { transform: scale(0.95); border-color: var(--primary); }
        
        .cat-fantasy i { color: #bc13fe; }
        .cat-cinema i { color: #ffb800; }
        .cat-art i { color: #00f3ff; }
        .cat-pro i { color: #00ff88; }

        /* מסך תוצאה */
        #resultControls { display: none; width: 100%; flex-direction: column; gap: 10px; }
        .action-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 1.1rem; font-weight: bold; display: flex; justify-content: center; align-items: center; gap: 10px; cursor: pointer; color: white;}
        #waBtn { background: #25D366; }
        #dlBtn { background: var(--primary); color: #000; }
        #rtBtn { background: transparent; border: 1px solid #555; }
    </style>
</head>
<body>
    <header>
        <h1>VIRAL AVATAR</h1>
    </header>
    
    <div class="container">
        <div class="viewport" id="viewport">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="canvas"></canvas>
            <img id="resultImg" alt="AI Result">
            
            <div class="scanner-container" id="scanner">
                <div class="scanner-line"></div>
                <div class="overlay-text">
                    <i class="fas fa-magic" style="font-size: 2rem; margin-bottom: 10px;"></i><br>
                    מפעיל מנוע בינה מלאכותית...<br>
                    <span style="font-size: 0.8rem; color: #fff; font-weight: normal;">זה עשוי לקחת עד 20 שניות</span>
                </div>
            </div>
        </div>
        
        <div class="bottom-area">
            <div class="camera-controls" id="cameraControls">
                <button class="icon-btn" id="switchCameraBtn"><i class="fas fa-sync-alt"></i></button>
                <button id="captureBtn"><i class="fas fa-camera"></i></button>
                <button class="icon-btn" style="visibility: hidden;"></button>
            </div>

            <div id="styleMenu">
                <div class="category">
                    <div class="category-title">פנטזיה וגיימינג</div>
                    <div class="style-scroll">
                        <div class="style-card cat-fantasy" onclick="applyStyle('jedi_master')"><i class="fab fa-jedi-order"></i><span>אביר ג'דיי</span></div>
                        <div class="style-card cat-fantasy" onclick="applyStyle('viking_king')"><i class="fas fa-gavel"></i><span>מלך ויקינגי</span></div>
                        <div class="style-card cat-fantasy" onclick="applyStyle('space_marine')"><i class="fas fa-rocket"></i><span>לוחם חלל</span></div>
                        <div class="style-card cat-fantasy" onclick="applyStyle('warlock')"><i class="fas fa-fire-alt"></i><span>מכשף אופל</span></div>
                    </div>
                </div>
                
                <div class="category">
                    <div class="category-title">קולנוע ותיאטרון</div>
                    <div class="style-scroll">
                        <div class="style-card cat-cinema" onclick="applyStyle('mafia_boss')"><i class="fas fa-user-tie"></i><span>בוס מאפיה</span></div>
                        <div class="style-card cat-cinema" onclick="applyStyle('gladiator')"><i class="fas fa-shield-alt"></i><span>גלדיאטור</span></div>
                        <div class="style-card cat-cinema" onclick="applyStyle('samurai')"><i class="fas fa-yin-yang"></i><span>סמוראי</span></div>
                    </div>
                </div>

                <div class="category">
                    <div class="category-title">אמנות ואווטארים</div>
                    <div class="style-scroll">
                        <div class="style-card cat-art" onclick="applyStyle('pixar_character')"><i class="fas fa-smile-beam"></i><span>פיקסאר 3D</span></div>
                        <div class="style-card cat-art" onclick="applyStyle('manga_style')"><i class="fas fa-book-open"></i><span>אנימה / מנגה</span></div>
                        <div class="style-card cat-art" onclick="applyStyle('oil_painting')"><i class="fas fa-palette"></i><span>ציור שמן</span></div>
                        <div class="style-card cat-art" onclick="applyStyle('statue')"><i class="fas fa-monument"></i><span>פסל שיש</span></div>
                    </div>
                </div>

                <div class="category">
                    <div class="category-title">פרופיל מקצועי (לינקדאין)</div>
                    <div class="style-scroll">
                        <div class="style-card cat-pro" onclick="applyStyle('tech_ceo')"><i class="fas fa-briefcase"></i><span>מנכ"ל הייטק</span></div>
                        <div class="style-card cat-pro" onclick="applyStyle('ted_talk')"><i class="fas fa-microphone-alt"></i><span>מרצה ב-TED</span></div>
                    </div>
                </div>
            </div>

            <div id="resultControls">
                <button class="action-btn" id="waBtn"><i class="fab fa-whatsapp"></i> שתף בווטסאפ</button>
                <button class="action-btn" id="dlBtn"><i class="fas fa-download"></i> שמור לגלריה</button>
                <button class="action-btn" id="rtBtn"><i class="fas fa-camera"></i> צלם מחדש</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const resultImg = document.getElementById('resultImg');
        const captureBtn = document.getElementById('captureBtn');
        const switchCameraBtn = document.getElementById('switchCameraBtn');
        const scanner = document.getElementById('scanner');
        
        const cameraControls = document.getElementById('cameraControls');
        const styleMenu = document.getElementById('styleMenu');
        const resultControls = document.getElementById('resultControls');

        const waBtn = document.getElementById('waBtn');
        const dlBtn = document.getElementById('dlBtn');
        const rtBtn = document.getElementById('rtBtn');

        let currentFacingMode = 'user';
        let stream = null;
        let capturedImageBase64 = null;

        const API_URL = "https://billowing-shape-1d81.maty-tsoraro.workers.dev";

        async function initCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            try {
                // המנגנון המעודכן והיציב למצלמה
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode } 
                });
                
                video.srcObject = stream;
                
                // ממתין בשקט שהעדשה תהיה מוכנה לפני הפעלה
                video.onloadedmetadata = () => {
                    video.play().catch(err => console.error("שגיאת הפעלה פנימית:", err));
                };
                
            } catch (err) {
                alert("שגיאה בגישה למצלמה: " + err.message);
            }
        }

        switchCameraBtn.addEventListener('click', () => {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            initCamera();
        });

        captureBtn.addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            
            if (currentFacingMode === 'user') {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(video, 0, 0);
            
            capturedImageBase64 = canvas.toDataURL('image/jpeg', 0.8);
            resultImg.src = capturedImageBase64;
            resultImg.style.display = 'block';
            video.style.display = 'none';

            cameraControls.style.display = 'none';
            styleMenu.style.display = 'flex';
        });

        window.applyStyle = async function(styleName) {
            styleMenu.style.display = 'none';
            scanner.style.display = 'block';

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ image: capturedImageBase64, style: styleName })
                });

                const data = await response.json();

                if (data.error) {
                    alert("שגיאה בשרת: " + data.error);
                    resetCamera();
                    return;
                }

                resultImg.src = data.resultUrl;
                
                scanner.style.display = 'none';
                resultControls.style.display = 'flex';

            } catch (err) {
                alert("שגיאת תקשורת: " + err.message);
                resetCamera();
            }
        };

        function resetCamera() {
            scanner.style.display = 'none';
            resultImg.style.display = 'none';
            video.style.display = 'block';
            resultControls.style.display = 'none';
            styleMenu.style.display = 'none';
            cameraControls.style.display = 'flex';
        }

        rtBtn.addEventListener('click', resetCamera);

        waBtn.addEventListener('click', async () => {
            try {
                const response = await fetch(resultImg.src);
                const blob = await response.blob();
                const file = new File([blob], 'Avatar.jpg', { type: 'image/jpeg' });
                
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: 'האווטאר שלי',
                        text: 'יצרתי את זה ב-Viral Avatar Studio! 🚀'
                    });
                } else {
                    alert("המכשיר שלך לא תומך בשיתוף ישיר. שמור לגלריה ושתף משם.");
                }
            } catch (err) {
                console.error("שגיאה בשיתוף:", err);
            }
        });

        dlBtn.addEventListener('click', async () => {
            try {
                const response = await fetch(resultImg.src);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'ViralAvatar_' + Date.now() + '.jpg';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(url);
            } catch (err) {
                alert("לא ניתן להוריד את התמונה ישירות.");
            }
        });

        initCamera();
    </script>
</body>
</html>
