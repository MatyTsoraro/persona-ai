<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PersonaAI Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #bc13fe;
            --bg: #0a0a12;
            --panel: #161625;
            --text: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { padding: 15px; text-align: center; background: linear-gradient(90deg, var(--panel), var(--bg)); border-bottom: 1px solid #333; z-index: 10;}
        h1 { font-size: 1.5rem; background: -webkit-linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; margin: 0;}
        
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 20px; position: relative; gap: 20px;}
        .viewport { width: 100%; max-width: 400px; flex-grow: 1; max-height: 60vh; background: var(--panel); border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 0 20px rgba(0, 0, 0, 0.5); border: 2px solid #2a2a40; transition: all 0.3s ease; }
        
        video, img, canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        img { display: none; z-index: 2; }
        canvas { display: none; }
        
        /* סורק ואפקטים */
        .scanner { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--primary); box-shadow: 0 0 20px 5px var(--primary); animation: scan 1.5s ease-in-out infinite alternate; display: none; z-index: 3; }
        .overlay-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 10px; font-weight: bold; color: var(--primary); border: 1px solid var(--primary); z-index: 4; display: none; backdrop-filter: blur(5px);}
        @keyframes scan { 0% { top: 0; opacity: 0.5; } 100% { top: 100%; opacity: 1; } }

        /* אזור כפתורים תחתון */
        .bottom-area { width: 100%; max-width: 400px; height: 120px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        
        .camera-controls { display: flex; justify-content: space-around; align-items: center; width: 100%; }
        button { background: var(--panel); color: var(--text); border: 1px solid #333; border-radius: 50%; width: 60px; height: 60px; font-size: 1.2rem; cursor: pointer; transition: all 0.2s ease; display: flex; justify-content: center; align-items: center; }
        button:active { transform: scale(0.95); }
        
        #captureBtn { background: linear-gradient(45deg, var(--primary), var(--secondary)); border: none; width: 80px; height: 80px; font-size: 2rem; box-shadow: 0 0 20px rgba(188, 19, 254, 0.4); color: white;}
        #retakeBtn, #downloadBtn { display: none; }

        /* תפריט סגנונות */
        .style-menu { display: none; width: 100%; justify-content: space-between; gap: 10px; padding: 0 10px; }
        .style-btn { flex: 1; height: 60px; border-radius: 15px; border: 2px solid #333; background: var(--panel); color: white; font-weight: bold; font-size: 0.9rem; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .style-btn i { font-size: 1.2rem; }
        .style-btn.cyber { border-color: #00f3ff; color: #00f3ff; }
        .style-btn.neon { border-color: #bc13fe; color: #bc13fe; }
        .style-btn.vintage { border-color: #ffb800; color: #ffb800; }
    </style>
</head>
<body>
    <header>
        <h1>PERSONA AI</h1>
    </header>
    
    <div class="container">
        <div class="viewport" id="viewport">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <img id="resultImg" alt="AI Result">
            
            <div class="scanner" id="scanner"></div>
            <div class="overlay-text" id="statusText">מעבד דמות בשרת AI...</div>
        </div>
        
        <div class="bottom-area">
            <div class="camera-controls" id="cameraControls">
                <button id="switchCameraBtn"><i class="fas fa-sync-alt"></i></button>
                <button id="captureBtn"><i class="fas fa-camera"></i></button>
                <button id="placeholder" style="visibility: hidden;"></button>
            </div>

            <div class="style-menu" id="styleMenu">
                <button class="style-btn cyber" onclick="applyStyle('cyber')">
                    <i class="fas fa-robot"></i> סייברפאנק
                </button>
                <button class="style-btn neon" onclick="applyStyle('neon')">
                    <i class="fas fa-bolt"></i> ניאון
                </button>
                <button class="style-btn vintage" onclick="applyStyle('vintage')">
                    <i class="fas fa-film"></i> קלאסי
                </button>
            </div>

            <div class="camera-controls" id="resultControls" style="display: none;">
                <button id="retakeBtn"><i class="fas fa-undo"></i></button>
                <button id="downloadBtn" style="background: var(--primary); color: #000;"><i class="fas fa-download"></i></button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const resultImg = document.getElementById('resultImg');
        const captureBtn = document.getElementById('captureBtn');
        const retakeBtn = document.getElementById('retakeBtn');
        const switchCameraBtn = document.getElementById('switchCameraBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const scanner = document.getElementById('scanner');
        const statusText = document.getElementById('statusText');
        
        const cameraControls = document.getElementById('cameraControls');
        const styleMenu = document.getElementById('styleMenu');
        const resultControls = document.getElementById('resultControls');

        let currentFacingMode = 'user';
        let stream = null;
        let capturedImageBase64 = null;

        // הכתובת של השרת שלך שיצרנו עכשיו
        const API_URL = "https://billowing-shape-1d81.maty-tsoraro.workers.dev";

        async function initCamera() {
            if (stream) stream.getTracks().forEach(track => track.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: { ideal: 1080 }, height: { ideal: 1440 } }
                });
                video.srcObject = stream;
            } catch (err) {
                alert("שגיאה בגישה למצלמה.");
            }
        }

        switchCameraBtn.addEventListener('click', () => {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            initCamera();
        });

        captureBtn.addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            
            if (currentFacingMode === 'user') {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(video, 0, 0);
            
            capturedImageBase64 = canvas.toDataURL('image/jpeg', 0.8);
            resultImg.src = capturedImageBase64;
            resultImg.style.display = 'block';
            video.style.display = 'none';

            cameraControls.style.display = 'none';
            styleMenu.style.display = 'flex';
        });

        window.applyStyle = async function(styleName) {
            styleMenu.style.display = 'none';
            scanner.style.display = 'block';
            statusText.style.display = 'block';
            statusText.innerText = "מעבד דמות בשרת AI (לוקח קצת זמן)...";
            resultImg.style.filter = "none";

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ image: capturedImageBase64, style: styleName })
                });

                const data = await response.json();

                if (data.error) {
                    alert("שגיאה מהשרת: " + data.error);
                    resetCamera();
                    return;
                }

                // הצגת התמונה המטורפת שחזרה מהשרת
                resultImg.src = data.resultUrl;
                
                scanner.style.display = 'none';
                statusText.style.display = 'none';
                resultControls.style.display = 'flex';
                retakeBtn.style.display = 'flex';
                downloadBtn.style.display = 'flex';

            } catch (err) {
                alert("שגיאת תקשורת: " + err.message);
                resetCamera();
            }
        };

        function resetCamera() {
            scanner.style.display = 'none';
            statusText.style.display = 'none';
            resultImg.style.display = 'none';
            video.style.display = 'block';
            resultControls.style.display = 'none';
            cameraControls.style.display = 'flex';
        }

        retakeBtn.addEventListener('click', resetCamera);

        downloadBtn.addEventListener('click', async () => {
            try {
                // המרה לקובץ אמיתי כדי לעקוף חסימות הורדה של דפדפנים בסמארטפון
                const response = await fetch(resultImg.src);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'PersonaAI_Avatar.jpg';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(url);
            } catch (err) {
                alert("לא ניתן להוריד את התמונה ישירות.");
            }
        });

        initCamera();
    </script>
</body>
</html>
